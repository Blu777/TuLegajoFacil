name: Publish Docker Image

on:
  push:
    branches: [ "main", "master" ]
  release:
    types: [published]
  workflow_dispatch: # Permite ejecución manual desde la UI de GitHub

env:
  # Usará tu usuario de Docker Hub y el nombre 'legajo-automator'
  IMAGE_NAME: ${{ secrets.DOCKERHUB_USERNAME }}/legajo-automator

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        # Autenticación segura usando GitHub Secrets
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          # Crea la etiqueta 'latest' y '1.0.x' auto-incremental en cada push
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=raw,value=1.0.${{ github.run_number }},enable={{is_default_branch}}
            type=ref,event=tag
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # Cache optimizado para GitHub Actions (acelera builds futuros)
          cache-from: type=gha
          cache-to: type=gha,mode=max
